<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: var(--vscode-font-family);
            padding: 8px;
            background: var(--vscode-sideBar-background);
            color: var(--vscode-foreground);
            font-size: 13px;
        }

        #toolbar {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        #toolbar button {
            font-size: 11px;
            padding: 3px 8px;
        }

        #btn-switch {
            margin-left: auto;
            background: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
        }

        #btn-clear {
            background: transparent;
            color: var(--vscode-descriptionForeground);
            border: 1px solid var(--vscode-input-border);
        }

        #messages {
            height: calc(100vh - 210px);
            overflow-y: auto;
            margin-bottom: 8px;
        }

        .msg {
            margin: 8px 0;
            padding: 8px;
            border-radius: 4px;
            word-wrap: break-word;
        }

        .user {
            background: var(--vscode-input-background);
            text-align: right;
        }

        .user.queued {
            opacity: 0.5;
            font-style: italic;
        }

        .assistant {
            background: var(--vscode-editor-inactiveSelectionBackground);
            white-space: normal;
        }

        .error {
            color: var(--vscode-errorForeground);
            background: var(--vscode-inputValidation-errorBackground);
            padding: 6px 8px;
            border-radius: 4px;
        }

        .system {
            color: var(--vscode-descriptionForeground);
            font-style: italic;
            font-size: 11px;
            text-align: center;
        }

        .card {
            margin: 6px 0;
            padding: 8px;
            border-radius: 4px;
            background: var(--vscode-editor-inactiveSelectionBackground);
            border-left: 3px solid var(--vscode-activityBarBadge-background);
        }

        .card-title {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .card.goal {
            border-left-color: #569cd6;
        }

        .card.goal .card-title {
            color: #569cd6;
        }

        .card.subgoal {
            border-left-color: #9cdcfe;
        }

        .card.subgoal .card-title {
            color: #9cdcfe;
        }

        .card.running {
            border-left-color: #dcdcaa;
        }

        .card.running .card-title {
            color: #dcdcaa;
        }

        .card.result {
            border-left-color: #4ec9b0;
        }

        .card.result .card-title {
            color: #4ec9b0;
        }

        .card.done-finished {
            border-left-color: #4ec9b0;
        }

        .card.done-finished .card-title {
            color: #4ec9b0;
        }

        .card.done-aborted {
            border-left-color: var(--vscode-errorForeground);
        }

        .card.done-aborted .card-title {
            color: var(--vscode-errorForeground);
        }

        .card.done-max {
            border-left-color: #dcdcaa;
        }

        .card.done-max .card-title {
            color: #dcdcaa;
        }

        .iteration-badge {
            display: inline-block;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            background: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
            margin-bottom: 4px;
        }

        pre {
            background: var(--vscode-editor-background);
            padding: 6px 8px;
            border-radius: 3px;
            overflow-x: auto;
            font-family: var(--vscode-editor-font-family);
            font-size: 12px;
            margin: 4px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        code {
            font-family: var(--vscode-editor-font-family);
            font-size: 12px;
            background: var(--vscode-editor-background);
            padding: 1px 4px;
            border-radius: 3px;
        }

        #input-row {
            display: flex;
            gap: 4px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            padding: 6px;
            border-radius: 4px;
            resize: none;
            font-family: inherit;
        }

        textarea:disabled {
            opacity: 0.6;
        }

        #btn-send {
            min-width: 52px;
        }

        #btn-stop {
            display: none;
            background: var(--vscode-errorForeground);
            color: #fff;
            min-width: 52px;
        }

        #btn-stop:hover {
            opacity: 0.85;
        }

        button {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        button:hover {
            background: var(--vscode-button-hoverBackground);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #queue-indicator {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            text-align: right;
            margin-bottom: 2px;
            min-height: 14px;
        }

        .markdown-body p {
            margin: 4px 0;
        }

        .markdown-body code {
            background: var(--vscode-textCodeBlock-background, #1e1e1e);
            padding: 1px 5px;
            border-radius: 3px;
            font-family: var(--vscode-editor-font-family, monospace);
            font-size: 10px;
        }

        .markdown-body pre {
            background: var(--vscode-textCodeBlock-background, #1e1e1e);
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 10px;
        }

        .markdown-body pre code {
            background: none;
            padding: 0;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 16px;
            margin: 4px 0;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            margin: 6px 0 4px;
            font-size: 12px;
        }

        .markdown-body a {
            color: var(--vscode-textLink-foreground);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>

<body>
    <div id="toolbar">
        <button id="btn-read">📄 File</button>
        <button id="btn-open">📂 Open</button>
        <button id="btn-list">🗂 List</button>
        <button id="btn-clear">🗑 Clear</button>
        <button id="btn-switch">🔄 <span id="provider-name">sarvam</span></button>
    </div>
    <div id="messages"></div>
    <div id="queue-indicator"></div>
    <div id="input-row">
        <textarea id="input" rows="3"
            placeholder="Describe what you want to build or fix...&#10;(Shift+Enter for newline)"></textarea>
        <div style="display:flex;flex-direction:column;gap:4px;">
            <button id="btn-send">Send</button>
            <button id="btn-stop">⏹ Stop</button>
        </div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const providerNameEl = document.getElementById('provider-name');
        const btnSend = document.getElementById('btn-send');
        const btnStop = document.getElementById('btn-stop');
        const queueIndicator = document.getElementById('queue-indicator');

        // ── State ─────────────────────────────────────────────────────────
        let isProcessing = false;
        let isStopped = false;
        const messageQueue = [];

        // ── Queue management ──────────────────────────────────────────────
        function setProcessing(val) {
            isProcessing = val;
            inputEl.disabled = val;
            btnSend.style.display = val ? 'none' : 'block';
            btnStop.style.display = val ? 'block' : 'none';
            if (!val) {
                isStopped = false;
                updateQueueIndicator();
                // Process next queued message if any
                if (messageQueue.length > 0) {
                    const next = messageQueue.shift();
                    updateQueueIndicator();
                    dispatchMessage(next);
                }
            }
        }

        function updateQueueIndicator() {
            if (messageQueue.length === 0) {
                queueIndicator.textContent = '';
            } else {
                queueIndicator.textContent = `⏳ ${messageQueue.length} message${messageQueue.length > 1 ? 's' : ''} queued`;
            }
        }

        function dispatchMessage(text) {
            setProcessing(true);
            vscode.postMessage({ type: 'ask', text });
        }

        // ── Toolbar ───────────────────────────────────────────────────────
        document.getElementById('btn-read').addEventListener('click', () => vscode.postMessage({ type: 'readFile' }));
        document.getElementById('btn-open').addEventListener('click', () => vscode.postMessage({ type: 'openFile' }));
        document.getElementById('btn-list').addEventListener('click', () => vscode.postMessage({ type: 'listFiles' }));
        document.getElementById('btn-clear').addEventListener('click', () => vscode.postMessage({ type: 'clearHistory' }));
        document.getElementById('btn-switch').addEventListener('click', () => vscode.postMessage({ type: 'switchProvider' }));

        btnStop.addEventListener('click', () => {
            isStopped = true;
            messageQueue.length = 0; // also drain queue on stop
            updateQueueIndicator();
            vscode.postMessage({ type: 'stopAgent' });
            addMessage('🛑 Stop requested — waiting for current command to finish...', 'system');
        });

        btnSend.addEventListener('click', send);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });

        function hashCommand(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0; // convert to 32bit int
            }
            return Math.abs(hash).toString(36);
        }

        // ── Send ──────────────────────────────────────────────────────────
        function send() {
            const text = inputEl.value.trim();
            if (!text) { return; }
            inputEl.value = '';
            addMessage(text, 'user');

            if (isProcessing) {
                // Queue it
                messageQueue.push(text);
                updateQueueIndicator();
                // Mark the message as queued visually
                const msgs = messagesEl.querySelectorAll('.msg.user');
                if (msgs.length > 0) {
                    msgs[msgs.length - 1].classList.add('queued');
                    msgs[msgs.length - 1].title = 'Queued — will send after current request finishes';
                }
            } else {
                dispatchMessage(text);
            }
        }

        // ── Helpers ───────────────────────────────────────────────────────
        function addMessage(text, cls) {
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            div.innerHTML = cls === 'assistant' ? renderMarkdown(text) : escapeHtml(text);
            messagesEl.appendChild(div);
            scroll();
        }

        function scroll() { messagesEl.scrollTop = messagesEl.scrollHeight; }

        function escapeHtml(text) {
            return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderMarkdown(text) {
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre>$2</pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        // ── Iteration groups ──────────────────────────────────────────────
        let currentIterationEl = null;
        let lastIteration = { n: 0, max: 0 };

        function getOrCreateIterationGroup(iteration, max) {
            const id = 'iter-' + iteration;
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('div');
                el.id = id;
                el.style.cssText = 'margin: 8px 0; padding: 6px; border-radius: 4px; border: 1px solid var(--vscode-input-border);';
                const badge = document.createElement('div');
                badge.className = 'iteration-badge';
                badge.textContent = `Iteration ${iteration} / ${max}`;
                el.appendChild(badge);
                messagesEl.appendChild(el);
                scroll();
            }
            currentIterationEl = el;
            return el;
        }

        function appendToIteration(childEl) {
            if (currentIterationEl) { currentIterationEl.appendChild(childEl); }
            else { messagesEl.appendChild(childEl); }
            scroll();
        }

        // ── Message handler ───────────────────────────────────────────────
        window.addEventListener('message', (e) => {
            const msg = e.data;

            if (msg.type === 'agentIteration') {
                lastIteration = { n: msg.iteration, max: msg.max };
                getOrCreateIterationGroup(msg.iteration, msg.max);
            }

            if (msg.type === 'agentGoal') {
                const card = document.createElement('div');
                card.className = 'card goal';
                card.innerHTML = '<div class="card-title">🎯 Goal</div><div>' + escapeHtml(msg.content) + '</div>';
                appendToIteration(card);
            }

            if (msg.type === 'agentSubGoal') {
                const card = document.createElement('div');
                card.className = 'card subgoal';
                card.innerHTML = '<div class="card-title">📋 ' + escapeHtml(msg.title) + '</div>';
                appendToIteration(card);
            }

            if (msg.type === 'shellRunning') {
                const card = document.createElement('div');
                card.className = 'card running';
                card.id = 'running-' + hashCommand(msg.command).slice(0, 12);
                card.innerHTML = '<div class="card-title">⏳ Running</div><pre>' + escapeHtml(msg.command) + '</pre>';
                appendToIteration(card);
            }

            if (msg.type === 'shellResult') {
                const runningId = 'running-' + hashCommand(msg.command).slice(0, 12);
                const runningCard = document.getElementById(runningId);

                const card = document.createElement('div');
                card.className = 'card result';
                const shortCmd = msg.command.length > 60 ? msg.command.slice(0, 60) + '...' : msg.command;
                card.innerHTML = '<div class="card-title">$ ' + escapeHtml(shortCmd) + '</div>';

                if (msg.stdout && msg.stdout !== '(no output)') {
                    const pre = document.createElement('pre');
                    pre.textContent = msg.stdout;
                    card.appendChild(pre);
                }
                if (msg.stderr) {
                    const pre = document.createElement('pre');
                    pre.style.color = 'var(--vscode-errorForeground)';
                    pre.textContent = '⚠️ stderr: ' + msg.stderr;
                    card.appendChild(pre);
                }

                if (runningCard) { runningCard.replaceWith(card); }
                else { appendToIteration(card); }
            }

            if (msg.type === 'toolResult') {
                const command = JSON.stringify(msg.tool) + " \n " + JSON.stringify(msg.arguments) + " \n ";
                const runningId = 'running-' + hashCommand(command).slice(0, 12);
                const runningCard = document.getElementById(runningId);

                const card = document.createElement('div');
                card.className = 'card result';
                const shortCmd = command.length > 60 ? command.slice(0, 60) + '...' : command;
                card.innerHTML = '<div class="card-title">$ ' + escapeHtml(shortCmd) + '</div>';

                if (msg.result && msg.result !== '(no output)') {
                    const pre = document.createElement('pre');
                    pre.textContent = command + msg.result;
                    card.appendChild(pre);
                }
                if (runningCard) { runningCard.replaceWith(card); }
                else { appendToIteration(card); }
            }

            if (msg.type === 'agentDone') {
                const statusMap = {
                    'FINISHED': { cls: 'done-finished', icon: '✅', label: 'Done' },
                    'ABORTED': { cls: 'done-aborted', icon: '🛑', label: 'Aborted' },
                    'TERMINATED': { cls: 'done-aborted', icon: '🛑', label: 'Terminated' },
                    'STOPPED': { cls: 'done-aborted', icon: '⏹', label: 'Stopped by user' },
                    'MAX_ITERATIONS': { cls: 'done-max', icon: '⚠️', label: 'Max iterations reached' },
                };
                const s = statusMap[msg.status] ?? { cls: 'done-finished', icon: '✅', label: msg.status };
                const card = document.createElement('div');
                card.className = 'card ' + s.cls;
                card.innerHTML = '<div class="card-title">' + s.icon + ' ' + s.label + '</div>';
                if (msg.message) {
                    // const p = document.createElement('div');
                    // p.style.fontSize = '11px';
                    // p.textContent = msg.message;
                    // card.appendChild(p);
                    const p = document.createElement('div');
                    p.style.fontSize = '11px';
                    p.classList.add('markdown-body');
                    p.innerHTML = marked.parse(msg.message);  // ✅ renders markdown
                    card.appendChild(p);
                }
                messagesEl.appendChild(card);
                currentIterationEl = null;
                scroll();
                // Release processing lock — triggers queue drain
                setProcessing(false);
                // Un-queue the oldest queued message visually
                const queued = messagesEl.querySelector('.msg.user.queued');
                if (queued) { queued.classList.remove('queued'); }
            }

            if (msg.type === 'reply') { addMessage(msg.text, 'assistant'); }
            if (msg.type === 'error') {
                addMessage('❌ ' + msg.text, 'error');
                setProcessing(false);
            }
            if (msg.type === 'editApplied') { addMessage('✅ File saved.', 'system'); }
            if (msg.type === 'fileContent') { addMessage('📄 Loaded: ' + msg.path, 'system'); }
            if (msg.type === 'fileList') { addMessage('📁 Files:\n' + msg.files.join('\n'), 'assistant'); }

            if (msg.type === 'historyCleared') {
                messagesEl.innerHTML = '';
                currentIterationEl = null;
                messageQueue.length = 0;
                updateQueueIndicator();
                setProcessing(false);
                addMessage('🗑 History cleared', 'system');
            }

            if (msg.type === 'providerChanged') {
                providerNameEl.textContent = msg.provider;
                addMessage('🔄 Switched to ' + msg.provider, 'system');
            }
        });
    </script>
</body>

</html>
